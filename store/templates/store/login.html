{% extends 'store/base.html' %}

{% block title %}Log In - NovaTech{% endblock %}

{% block content %}
<style>
/* Neumorphism Override for Body */
body {
    background: #0f172a !important; /* Force darker background */
    color: #f8fafc !important; /* Force light text */
}

/* Hide the main navbar styles temporarily if they clash, or adjust them */
.navbar {
    background: #0f172a !important;
    border-bottom: none !important;
    box-shadow: 5px 5px 15px #0a101d, -5px -5px 15px #141e37 !important;
}
.navbar .brand, .navbar .nav-link {
    color: #f8fafc !important;
    -webkit-text-fill-color: initial;
    text-shadow: none;
}

/* Neumorphism Login Form */
.login-container {
    width: 100%;
    max-width: 420px;
    margin: 4rem auto;
}

.login-card {
    background: #0f172a;
    border-radius: 30px;
    padding: 50px 40px;
    box-shadow: 
        20px 20px 60px #0a101d,
        -20px -20px 60px #141e37;
    position: relative;
    transition: all 0.3s ease;
}

.login-card:hover {
    transform: translateY(-5px);
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
}

.neu-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    background: #0f172a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 
        8px 8px 20px #0a101d,
        -8px -8px 20px #141e37,
        inset 0 0 0 #0a101d,
        inset 0 0 0 #141e37;
    transition: all 0.3s ease;
}

.neu-icon:hover {
    box-shadow: 
        4px 4px 10px #0a101d,
        -4px -4px 10px #141e37,
        inset 4px 4px 10px #0a101d,
        inset -4px -4px 10px #141e37;
}

.icon-inner {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0ea5e9;
}

.icon-inner svg {
    width: 100%;
    height: 100%;
}

.login-header h2 {
    color: #f8fafc;
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 8px;
}

.login-header p {
    color: #94a3b8;
    font-size: 15px;
    font-weight: 400;
}

.form-group {
    margin-bottom: 28px;
    position: relative;
}

.neu-input {
    position: relative;
    background: #0f172a;
    border-radius: 15px;
    box-shadow: 
        inset 8px 8px 16px #0a101d,
        inset -8px -8px 16px #141e37;
    transition: all 0.3s ease;
}

.neu-input:focus-within {
    box-shadow: 
        inset 4px 4px 8px #0a101d,
        inset -4px -4px 8px #141e37;
}

.neu-input input {
    width: 100%;
    background: transparent;
    border: none;
    padding: 20px 24px;
    padding-left: 55px;
    color: #f8fafc;
    font-size: 16px;
    font-weight: 500;
    outline: none;
    transition: all 0.3s ease;
}

.neu-input input::placeholder {
    color: transparent;
}

.neu-input label {
    position: absolute;
    left: 55px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: 16px;
    font-weight: 400;
    pointer-events: none;
    transition: all 0.3s ease;
}

.neu-input input:focus + label,
.neu-input input:not(:placeholder-shown) + label {
    top: 8px;
    font-size: 12px;
    color: #0ea5e9;
    transform: translateY(0);
}

.input-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    color: #94a3b8;
    transition: all 0.3s ease;
}

.neu-input:focus-within .input-icon {
    color: #0ea5e9;
}

.neu-button {
    width: 100%;
    background: #0f172a;
    border: none;
    border-radius: 15px;
    padding: 18px 32px;
    color: #f8fafc;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    margin-bottom: 30px;
    box-shadow: 
        8px 8px 20px #0a101d,
        -8px -8px 20px #141e37;
    transition: all 0.3s ease;
    overflow: hidden;
    margin-top: 20px;
}

.neu-button:hover {
    transform: translateY(-2px);
    box-shadow: 
        12px 12px 30px #0a101d,
        -12px -12px 30px #141e37;
}

.neu-button:active {
    transform: translateY(0);
    box-shadow: 
        inset 4px 4px 10px #0a101d,
        inset -4px -4px 10px #141e37;
}

.signup-link {
    text-align: center;
}

.signup-link p {
    color: #94a3b8;
    font-size: 14px;
}

.signup-link a {
    color: #0ea5e9;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.signup-link a:hover {
    color: #f8fafc;
}

.error-message {
    color: #ff3b5c;
    font-size: 14px;
    font-weight: 500;
    margin-top: 8px;
    display: block;
    text-align: center;
}

/* Technology items added */
.tech-bg-item {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #0f172a;
    box-shadow: inset 10px 10px 20px #0a101d, inset -10px -10px 20px #141e37;
    z-index: -1;
}

.tech-item-1 { top: -20px; left: -20px; }
.tech-item-2 { bottom: -30px; right: -20px; width: 140px; height: 140px; }
</style>

<div class="login-container">
    <div class="login-card">
        <!-- added tech items for neumorphic design background -->
        <div class="tech-bg-item tech-item-1"></div>
        <div class="tech-bg-item tech-item-2"></div>
        
        <div class="login-header">
            <div class="neu-icon">
                <div class="icon-inner">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <!-- Tech CPU / Microchip icon -->
                        <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                        <rect x="9" y="9" width="6" height="6"></rect>
                        <line x1="9" y1="1" x2="9" y2="4"></line>
                        <line x1="15" y1="1" x2="15" y2="4"></line>
                        <line x1="9" y1="20" x2="9" y2="23"></line>
                        <line x1="15" y1="20" x2="15" y2="23"></line>
                        <line x1="20" y1="9" x2="23" y2="9"></line>
                        <line x1="20" y1="14" x2="23" y2="14"></line>
                        <line x1="1" y1="9" x2="4" y2="9"></line>
                        <line x1="1" y1="14" x2="4" y2="14"></line>
                    </svg>
                </div>
            </div>
            <h2>NovaTech Login</h2>
            <p>Access your tech dashboard</p>
        </div>
        
        <form method="post" class="login-form">
            {% csrf_token %}
            {% if form.errors %}
                <span class="error-message">Invalid username or password.</span>
            {% endif %}
            
            <div class="form-group">
                <div class="input-group neu-input">
                    <!-- Django's auth form expects 'username' instead of 'email' -->
                    <input type="text" id="username" name="username" required placeholder=" ">
                    <label for="username">Username</label>
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-group neu-input password-group">
                    <input type="password" id="password" name="password" required placeholder=" ">
                    <label for="password">Password</label>
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                    </div>
                </div>
            </div>

            <button type="submit" class="neu-button login-btn">
                <span class="btn-text">Sign In</span>
            </button>
        </form>

        <div class="signup-link">
            <p>Don't have an account? <a href="{% url 'store:register' %}">Sign up directly</a></p>
        </div>
    </div>
</div>
{% endblock %}
