{% extends 'store/base.html' %}

{% block title %}Contact Us - NovaTech{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto; background: var(--bg-card); padding: 3rem; border-radius: 20px; border: 1px solid var(--border-glass);">
    <h2 style="margin-bottom: 2rem; color: var(--accent-glow);">Contact Support</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">We're here to help you with your premium tech. Reach out and our team will be in touch shortly.</p>
    
    <form method="post" style="display: flex; flex-direction: column; gap: 1.5rem;">
        {% csrf_token %}
        <style>
            .form-group label { color: var(--text-secondary); margin-bottom: 0.5rem; display: block; font-weight: 500; }
            .form-group input, .form-group textarea { width: 100%; padding: 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 12px; color: white; font-family: inherit; font-size: 1rem; transition: border-color 0.3s; }
            .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--accent-glow); }
        </style>
        
        <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="johndoe@example.com">
        </div>
        
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="How can we help you?"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem; padding: 1rem;">Send Message</button>
    </form>
</div>
{% endblock %}
